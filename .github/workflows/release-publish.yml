name: Publish release

on:
  release:
    types: [published]

jobs:
  publish-artifacts:
    name: Publish docs and packages
    runs-on: ubuntu-latest
    steps:
      - name: Setup Cloudsmith CLI
        uses: cloudsmith-io/cloudsmith-cli-action@v2
        with:
          api-key: ${{ secrets.CONAN_DEPLOY_KEY }}

      - name: Parse version from tag
        id: version
        uses: release-kit/semver@v2

      - name: Download docs asset
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.event.release.tag_name }}
          fileName: 'openpresso-ctl-html-docs-${{ steps.version.outputs.full }}.zip'
          out-file-path: openpresso-ctl-html-docs-${{ steps.version.outputs.full }}
          extract: true

      - name: Publish docs
        uses: openpresso/openpresso.github.io/.github/actions/deploy-docs@gh-pages
        with:
          commit_message: "[CI] Openpresso-ctl docs deployed: ${{ steps.version.outputs.full }}"
          repository: openpresso/openpresso.github.io
          deployment_key: ${{ secrets.PAGES_DEPLOY_KEY }}
          source_dir: openpresso-ctl-html-docs-${{ steps.version.outputs.full }}
          target_dir: openpresso-ctl
          checkout_path: pages
          version: ${{ steps.version.outputs.full }}
          verion_type: 'stable'

      - name: Publish conan packages
        run: |
          QUERY="name:openpresso-ctl AND version:${{ steps.version.outputs.full }}"
          SLUGS=$(cloudsmith list packages openpresso/draft -F pretty_json -q "$QUERY" | jq -r '.data[].slug_perm')
          while read -r slug; do
            cloudsmith move -y openpresso/draft/$slug stable
          done <<< "$SLUGS"
